name: Build and Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate and build all apps
        shell: bash
        run: |
          set -euo pipefail
          # Detectar todas las subcarpetas que tengan package.json + scripts/build.mjs
          for dir in */; do
            app="${dir%/}"
            if [ -f "$app/package.json" ] && [ -f "$app/scripts/build.mjs" ]; then
              echo "::group::Validate + build $app"
              (cd "$app" && node scripts/validate.mjs && node scripts/build.mjs)
              echo "::endgroup::"
            fi
          done

      - name: Build sitemap (auto-update)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f scripts/build-sitemap.mjs ]; then
            echo "::group::Build sitemap"
            node scripts/build-sitemap.mjs
            echo "::endgroup::"
          fi

      - name: Prepare deployment artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site

          # CNAME al root del artifact si existe (custom domain)
          if [ -f CNAME ]; then cp CNAME _site/CNAME; fi

          # Landing page (root del catálogo TLP). Si existe carpeta landing/ con
          # index.html, copiamos ese árbol al root del artifact. Si no existe,
          # generamos un index.html mínimo de fallback.
          if [ -d landing ] && [ -f landing/index.html ]; then
            echo "Using landing/ as root index"
            cp -R landing/. _site/
          else
            echo "No landing/ found — generating fallback index.html"
            cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="es"><head>
          <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
          <title>evaluacosas — The Launch Pad</title>
          <style>body{font-family:Inter,system-ui,sans-serif;background:#07111d;color:#eef6ff;margin:0;padding:48px 24px}h1{font-size:2.2rem}a{color:#67d1ff}</style>
          </head><body><h1>evaluacosas</h1><p>Catálogo TLP. (Landing en construcción.)</p><ul id="apps-list"></ul>
          <script>document.getElementById('apps-list').innerHTML='__APPS__';</script>
          </body></html>
          HTML
          fi

          # apps.json al root del artifact (fuente que la landing puede consumir)
          if [ -f apps.json ]; then cp apps.json _site/apps.json; fi

          # Cada app a su subcarpeta en _site (apps con package.json + index.html)
          for dir in */; do
            app="${dir%/}"
            case "$app" in
              landing|services|docs|.github|node_modules|dashboard) continue ;;
            esac
            if [ -f "$app/package.json" ] && [ -f "$app/index.html" ]; then
              echo "  → copying app: $app"
              mkdir -p "_site/$app"
              cp -R "$app"/* "_site/$app/"
            fi
          done

          # Dashboard del docente (estático, sin build) → _site/dashboard/
          if [ -d dashboard ] && [ -f dashboard/index.html ]; then
            echo "  → copying dashboard"
            mkdir -p _site/dashboard
            cp -R dashboard/. _site/dashboard/
          fi

          # Carpetas estáticas de docs/ayuda/legal (sin build, solo HTML)
          for static_dir in ayuda privacy terms ayuda/dashboard ayuda/estudiantes ayuda/problemas ayuda/privacidad sitemap; do
            if [ -d "$static_dir" ] && [ -f "$static_dir/index.html" ]; then
              echo "  → copying static: $static_dir"
              mkdir -p "_site/$static_dir"
              cp -R "$static_dir"/. "_site/$static_dir/"
            fi
          done

          # Reemplazar placeholder en fallback index si fue usado
          if grep -q "__APPS__" _site/index.html 2>/dev/null; then
            apps_html=""
            for dir in _site/*/; do
              app=$(basename "$dir")
              [ "$app" = "_site" ] && continue
              [ -f "$dir/index.html" ] || continue
              title=$(grep -m1 '<title>' "$dir/index.html" 2>/dev/null | sed -E 's/.*<title>([^<]*)<\/title>.*/\1/' || echo "$app")
              apps_html+="<li><a href=\"$app/\">$title</a></li>"
            done
            sed -i "s|__APPS__|$apps_html|" _site/index.html
          fi

          echo "=== _site contents ==="
          ls -la _site/
          echo "=== _site total size ==="
          du -sh _site/

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
