<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#07111d" media="(prefers-color-scheme: dark)">
  <meta name="color-scheme" content="dark light">
  <meta name="robots" content="noindex">
  <meta name="description" content="Página no encontrada — evaluacosas TLP">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <title>404 — No encontrada · evaluacosas TLP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800;900&display=swap">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/device-view.css">
  <style>
    .err-main {
      width: min(680px, calc(100% - 32px));
      margin: 80px auto;
      text-align: center;
      padding: 56px 36px;
      border-radius: var(--r-xl);
      background: var(--glass-tint);
      border: 1px solid var(--hairline);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
    }
    .err-code {
      font-size: clamp(4rem, 12vw, 7rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin: 0 0 16px;
    }
    .err-title {
      margin: 0 0 12px;
      font-size: clamp(1.4rem, 1rem + 1vw, 1.8rem);
      font-weight: 700;
    }
    .err-lead { color: var(--muted); margin: 0 0 28px; font-size: 1.05rem; line-height: 1.6; }
    .err-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .err-btn {
      padding: 12px 22px;
      border-radius: var(--r-pill);
      font-weight: 700;
      text-decoration: none;
      transition: transform var(--dur-fast) var(--ease-spring);
      border: 1px solid var(--hairline);
    }
    .err-btn-primary { background: var(--accent); color: #06110b; border-color: transparent; }
    .err-btn-ghost { background: var(--glass-tint); color: var(--text); }
    .err-btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <a class="skip-to-content" href="#main">Saltar al contenido</a>

  <nav class="globalnav" aria-label="Navegación principal">
    <div class="globalnav-inner">
      <a class="globalnav-brand" href="/">
        <span class="globalnav-mark" aria-hidden="true">✺</span>
        <span class="globalnav-name">evaluacosas <span class="globalnav-sub">TLP</span></span>
      </a>
      <ul class="globalnav-links" role="list">
        <li><a href="/">Inicio</a></li>
        <li><a href="/#catalog">Catálogo</a></li>
        <li><a href="/ayuda/">Ayuda</a></li>
        <li><a href="/sitemap/">🗺️ Mapa</a></li>
      </ul>
    </div>
  </nav>

  <main class="err-main" id="main">
    <p class="err-code" aria-label="Error 404">404</p>
    <h1 class="err-title">Esta página no existe</h1>
    <p class="err-lead">La URL que pediste no corresponde a ninguna página activa de evaluacosas. Puede ser un link viejo o un typo.</p>
    <div class="err-actions">
      <a href="/" class="err-btn err-btn-primary">Ir al inicio</a>
      <a href="/sitemap/" class="err-btn err-btn-ghost">Ver mapa del sitio</a>
      <a href="/ayuda/" class="err-btn err-btn-ghost">Centro de ayuda</a>
    </div>
  </main>

  <script src="/device-view.js" defer></script>
</body>
</html>
